
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Técnicos por Área — RJ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══ TEMA DIURNO ══ */
:root {
  --bg:      #FFF7F2;
  --surface: #FFFFFF;
  --card:    #FFFFFF;
  --card2:   #FFF0E8;
  --border:  rgba(255,80,0,0.12);
  --border2: rgba(255,80,0,0.28);

  --accent:  #FF4500;
  --accent2: #FF8800;
  --accent3: #FFCC00;

  --text:    #1A0A00;
  --text2:   #5C3010;
  --muted:   #B07040;

  --success: #00C97A;
  --danger:  #FF2244;
  --warn:    #FF8C00;

  --logo-grd: linear-gradient(135deg,#FF4500,#FF8800);
  --btn-grd:  linear-gradient(135deg,#FF4500,#FF8800);

  --glow:    rgba(255,69,0,0.13);
  --glow2:   rgba(255,136,0,0.07);

  /* busy palette */
  --busy1:#E8A800; --busy2:#E07000; --busy3:#D04000;
  --busy4:#CC1A1A; --busy5:#990000;

  /* region colors */
  --rj-color:    #FF4500;
  --bxd-color:   #8B5CF6;
  --oeste-color: #00A86B;
  --wk-color:    #D946EF;

  --online:  #00C97A;
  --offline: #FF2244;

  --tag-bg:  rgba(255,80,0,0.06);
}

/* ══ TEMA NOTURNO ══ */
body.theme-night {
  --bg:      #03080F;
  --surface: #060E1C;
  --card:    #09132A;
  --card2:   #0D1A33;
  --border:  rgba(30,100,255,0.18);
  --border2: rgba(30,100,255,0.38);

  --accent:  #1E64FF;
  --accent2: #22B8FF;
  --accent3: #A3D4FF;

  --text:    #E0ECFF;
  --text2:   #7BA0D8;
  --muted:   #3A5A90;

  --success: #00FFB2;
  --danger:  #FF3B5C;
  --warn:    #FFB800;

  --logo-grd: linear-gradient(135deg,#1E64FF,#22B8FF);
  --btn-grd:  linear-gradient(135deg,#1E64FF,#22B8FF);

  --glow:    rgba(30,100,255,0.15);
  --glow2:   rgba(34,184,255,0.08);

  --busy1:#FFCC00; --busy2:#FF9900; --busy3:#FF6600;
  --busy4:#FF3333; --busy5:#CC0000;

  --rj-color:    #FF6B35;
  --bxd-color:   #A78BFA;
  --oeste-color: #34D399;
  --wk-color:    #F0ABFC;

  --online:  #00FFB2;
  --offline: #FF3B5C;
  --tag-bg:  rgba(30,100,255,0.08);
}

body.theme-night header { background: rgba(3,8,15,0.90); }

/* ─── RESET ─── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background .5s, color .3s;
}

body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 55% at 10% 0%, var(--glow) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 90% 100%, var(--glow2) 0%, transparent 55%);
}
body > * { position:relative; z-index:1; }

/* ══ HEADER ══ */
header {
  padding: 0 2.5rem;
  height: 76px;
  display: flex; align-items: center; justify-content: space-between; gap:1rem; flex-wrap:wrap;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(14px);
  background: rgba(255,247,242,0.92);
  box-shadow: 0 1px 0 var(--border);
  position: sticky; top:0; z-index:100;
}

.logo-mark { display:flex; align-items:center; gap:.85rem; }

.logo-badge {
  background: var(--logo-grd);
  border-radius:10px; width:48px; height:48px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow:0 0 24px var(--glow), 0 3px 12px rgba(0,0,0,.12);
  position:relative; overflow:hidden;
}
.logo-badge::after {
  content:''; position:absolute; top:-30%; left:-10%;
  width:60%; height:160%; background:rgba(255,255,255,.18); transform:rotate(20deg);
}
.logo-badge span {
  font-family:'Bebas Neue',sans-serif; font-size:1.4rem; color:#fff; letter-spacing:.06em; line-height:1;
}

.logo-text h1 {
  font-family:'Bebas Neue',sans-serif; font-size:1.35rem; letter-spacing:.08em; color:var(--text); line-height:1;
}
.logo-text p {
  font-family:'DM Mono',monospace; font-size:.58rem; color:var(--muted);
  letter-spacing:.12em; text-transform:uppercase; margin-top:3px;
}

.header-right { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; }

.btn-home {
  display:flex; align-items:center; gap:.4rem;
  padding:.42rem 1rem; border-radius:8px;
  border:1px solid var(--border2); background:transparent;
  color:var(--text2); font-family:'DM Sans',sans-serif;
  font-size:.76rem; font-weight:600; cursor:pointer; text-decoration:none; transition:all .2s;
}
.btn-home:hover { background:var(--border); color:var(--text); border-color:var(--accent); }

.shift-pill {
  display:flex; align-items:center; gap:.6rem;
  padding:.42rem 1rem; border-radius:8px;
  border:1px solid var(--border2); background:var(--surface);
}
.shift-icon { font-size:1rem; }
.shift-label { font-size:.74rem; font-weight:700; color:var(--accent); line-height:1; }
.shift-clock { font-family:'DM Mono',monospace; font-size:.56rem; color:var(--muted); margin-top:2px; line-height:1; }

/* ══ CONTAINER ══ */
.container { max-width:1360px; margin:0 auto; padding:1.75rem 2.5rem; }

/* ══ SHIFT WARN ══ */
.shift-warn {
  display:none; align-items:center; gap:.65rem;
  padding:.8rem 1.2rem; border-radius:12px;
  background:rgba(30,100,255,.06); border:1px solid rgba(30,100,255,.2);
  color:var(--accent); font-family:'DM Mono',monospace; font-size:.75rem;
  margin-bottom:1rem; animation:slideIn .3s ease;
}
body:not(.theme-night) .shift-warn { background:rgba(255,69,0,.05); border-color:rgba(255,69,0,.18); }
.shift-warn.active { display:flex; }
@keyframes slideIn { from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);} }

/* ══ BUSY PANEL ══ */
.busy-panel {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:.85rem 1.2rem; margin-bottom:1rem;
  display:none;
}
.busy-panel.active { display:block; }
.panel-label {
  font-family:'DM Mono',monospace; font-size:.6rem;
  text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:.6rem;
}
.busy-chips { display:flex; flex-wrap:wrap; gap:.4rem; }
.busy-chip {
  display:flex; align-items:center; gap:.3rem;
  padding:.22rem .65rem; border-radius:100px;
  font-family:'DM Mono',monospace; font-size:.7rem; font-weight:600; border:1.5px solid;
}

/* ══ WEEKEND PANEL ══ */
.weekend-panel {
  background:rgba(217,70,239,.04); border:1px solid rgba(217,70,239,.18);
  border-radius:14px; padding:.9rem 1.2rem; margin-bottom:1rem;
}
.weekend-hdr {
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; user-select:none; gap:.75rem;
}
.weekend-title {
  font-size:.82rem; font-weight:700; color:var(--wk-color);
  display:flex; align-items:center; gap:.45rem;
}
.weekend-count { font-size:.65rem; color:var(--muted); font-weight:400; font-family:'DM Mono',monospace; }
.weekend-chevron { font-size:.7rem; color:var(--wk-color); transition:transform .25s; }
.weekend-panel.collapsed .weekend-chevron { transform:rotate(-90deg); }
.weekend-body { overflow:hidden; transition:max-height .3s ease, opacity .25s; }
.weekend-panel.collapsed .weekend-body { max-height:0!important; opacity:0; margin-top:0!important; }
.weekend-body { margin-top:.9rem; }
.weekend-empty { font-family:'DM Mono',monospace; font-size:.73rem; color:var(--muted); font-style:italic; }
.weekend-slots { display:flex; flex-wrap:wrap; gap:.5rem; }
.wk-slot {
  display:flex; align-items:center; gap:.45rem;
  padding:.4rem .85rem; border-radius:10px;
  border:1px solid rgba(217,70,239,.22); background:rgba(217,70,239,.05);
}
.wk-slot-name { font-size:.78rem; font-weight:700; color:var(--wk-color); }
.wk-slot-area { font-size:.62rem; font-family:'DM Mono',monospace; color:var(--muted); }

/* ══ TOOLBAR ══ */
.toolbar {
  display:flex; align-items:center; gap:.55rem; margin-bottom:.85rem; flex-wrap:wrap;
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:.65rem;
}
.search-wrap {
  flex:1; min-width:180px;
  display:flex; align-items:center; gap:.45rem;
  background:var(--card2); border:1px solid var(--border);
  border-radius:9px; padding:.52rem .9rem;
}
.search-wrap .s-ico { color:var(--muted); font-size:.82rem; }
.search-wrap input {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--text); font-family:'DM Mono',monospace; font-size:.78rem;
}
.search-wrap input::placeholder { color:var(--muted); }

.tbtn {
  display:inline-flex; align-items:center; gap:.38rem;
  padding:.48rem .95rem; border-radius:100px;
  border:1px solid var(--border); background:transparent;
  color:var(--text2); font-family:'DM Sans',sans-serif;
  font-size:.74rem; font-weight:600;
  cursor:pointer; transition:all .18s; white-space:nowrap; user-select:none;
}
.tbtn:hover { border-color:var(--border2); color:var(--text); background:var(--card2); }
.tbtn.on { border-color:var(--accent); color:var(--accent); background:rgba(255,69,0,.06); }
body.theme-night .tbtn.on { background:rgba(30,100,255,.08); }

.tbtn .chv { font-style:normal; font-size:.65rem; transition:transform .22s; }
.tbtn.open .chv { transform:rotate(180deg); }

.tbtn-primary {
  background:var(--btn-grd); border-color:transparent; color:#fff;
  box-shadow:0 4px 14px var(--glow);
}
.tbtn-primary:hover { filter:brightness(1.08); transform:translateY(-1px); box-shadow:0 6px 20px var(--glow); }

.tbtn-night { border-color:rgba(30,100,255,.4); color:#4d9fff; }
body:not(.theme-night) .tbtn-night { border-color:var(--border2); color:var(--muted); }
.tbtn-night.on { border-color:#4d9fff; background:rgba(30,100,255,.08); color:#4d9fff; }

.area-badge-pill {
  font-family:'DM Mono',monospace; font-size:.66rem; font-weight:600;
  color:var(--accent); background:rgba(255,69,0,.07);
  border:1px solid var(--border2); border-radius:100px;
  padding:.22rem .65rem;
}
body.theme-night .area-badge-pill { background:rgba(30,100,255,.1); }

/* ══ AREAS PANEL ══ */
.areas-panel {
  overflow:hidden; max-height:0; opacity:0;
  transition:max-height .35s ease, opacity .25s, margin-bottom .25s;
  margin-bottom:0;
}
.areas-panel.open { max-height:500px; opacity:1; margin-bottom:.85rem; }
.areas-scroll { display:flex; flex-wrap:wrap; gap:.4rem; padding:.6rem 0 .25rem; }
.area-btn {
  padding:.35rem .78rem; border-radius:100px;
  border:1px solid var(--border); background:var(--surface);
  color:var(--muted); font-family:'DM Sans',sans-serif;
  font-size:.72rem; font-weight:600; cursor:pointer; transition:all .18s; white-space:nowrap;
}
.area-btn:hover { border-color:var(--border2); color:var(--text); }
.area-btn.selected {
  background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700;
}
body.theme-night .area-btn.selected { color:#fff; }

/* ══ RESULTS ROW ══ */
.results-row {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:.9rem; flex-wrap:wrap; gap:.4rem;
}
.results-count { font-family:'DM Mono',monospace; font-size:.72rem; color:var(--muted); }
.results-count strong { color:var(--accent); }

/* ══ REGION ══ */
.region-section { margin-bottom:2rem; }
.region-hdr {
  display:flex; align-items:center; gap:.65rem;
  padding-bottom:.55rem; margin-bottom:.9rem;
  border-bottom:1px solid var(--border);
  cursor:pointer; user-select:none;
}
.region-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.region-name {
  font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:.05em;
}
.region-count { font-family:'DM Mono',monospace; font-size:.65rem; color:var(--muted); }
.region-toggle { margin-left:auto; font-style:normal; font-size:.72rem; color:var(--muted); transition:transform .22s; }
.region-section.collapsed .region-toggle { transform:rotate(-90deg); }

.region-body { overflow:hidden; transition:max-height .35s ease, opacity .25s; }
.region-section.collapsed .region-body { max-height:0!important; opacity:0; }

/* ══ TURNO DIVIDER ══ */
.turno-div {
  display:flex; align-items:center; gap:.5rem;
  margin:.85rem 0 .7rem;
}
.turno-div-line { flex:1; height:1px; background:var(--border); }
.turno-div-pill {
  font-family:'DM Mono',monospace; font-size:.6rem; letter-spacing:.1em;
  text-transform:uppercase; padding:.18rem .6rem;
  border-radius:100px; border:1px solid; white-space:nowrap;
}
.turno-div-pill.dia   { color:var(--accent2);  border-color:rgba(255,136,0,.35);  background:rgba(255,136,0,.07); }
.turno-div-pill.noite { color:#4d9fff; border-color:rgba(30,100,255,.35); background:rgba(30,100,255,.07); }
body:not(.theme-night) .turno-div-pill.dia   { color:#c06000; border-color:rgba(192,96,0,.35); background:rgba(255,136,0,.07); }
body:not(.theme-night) .turno-div-pill.noite { color:#1a6aff; }

/* ══ CARDS GRID ══ */
.cards-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(315px, 1fr));
  gap:.85rem;
}

/* ══ TECH CARD ══ */
.tech-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:1.1rem 1.2rem;
  transition:border-color .2s, transform .15s, box-shadow .2s, opacity .25s, filter .25s;
  position:relative; overflow:hidden;
}
.tech-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2.5px;
  opacity:0; transition:opacity .2s; border-radius:14px 14px 0 0;
}
.tech-card:not(.is-offline):hover { transform:translateY(-2px); }
.tech-card:not(.is-offline):hover::before { opacity:1; }

/* region tint on hover top bar */
.tech-card[data-region="RJ"]    { --rc: var(--rj-color); }
.tech-card[data-region="BXD"]   { --rc: var(--bxd-color); }
.tech-card[data-region="OESTE"] { --rc: var(--oeste-color); }
.tech-card::before { background: var(--rc, var(--accent)); }
.tech-card:not(.is-offline):hover { border-color:var(--rc, var(--accent)); }
.tech-card:not(.is-offline):hover { box-shadow:0 6px 24px rgba(0,0,0,.07); }

/* night card subtle tint */
.tech-card.night-card { border-color:rgba(30,100,255,.2); }
body:not(.theme-night) .tech-card.night-card { border-color:rgba(30,100,255,.18); }

/* offline */
.tech-card.is-offline { opacity:.42; filter:grayscale(.6); }
.tech-card.is-offline::before { background:var(--offline)!important; opacity:1!important; }
.tech-card.is-offline { border-color:rgba(255,34,68,.28)!important; }

/* busy levels */
.tech-card.busy-1 { border-color:var(--busy1)!important; box-shadow:0 0 10px rgba(232,168,0,.12); }
.tech-card.busy-2 { border-color:var(--busy2)!important; box-shadow:0 0 12px rgba(224,112,0,.16); }
.tech-card.busy-3 { border-color:var(--busy3)!important; box-shadow:0 0 14px rgba(208,64,0,.2); }
.tech-card.busy-4 { border-color:var(--busy4)!important; box-shadow:0 0 16px rgba(204,26,26,.22); }
.tech-card.busy-5 { border-color:var(--busy5)!important; box-shadow:0 0 20px rgba(153,0,0,.28); }
.tech-card.busy-1::before,.tech-card.busy-2::before,.tech-card.busy-3::before,
.tech-card.busy-4::before,.tech-card.busy-5::before { opacity:1!important; }
.tech-card.busy-1::before { background:var(--busy1); }
.tech-card.busy-2::before { background:var(--busy2); }
.tech-card.busy-3::before { background:var(--busy3); }
.tech-card.busy-4::before { background:var(--busy4); }
.tech-card.busy-5::before { background:var(--busy5); }

/* ── card internals ── */
.card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:.75rem; margin-bottom:.8rem; }
.card-info { flex:1; min-width:0; }

.name-row { display:flex; align-items:center; gap:.4rem; flex-wrap:wrap; }
.status-dot {
  width:7px; height:7px; border-radius:50%; flex-shrink:0; transition:background .3s, box-shadow .3s;
}
.status-dot.online  { background:var(--online);  box-shadow:0 0 6px rgba(0,201,122,.5); }
.status-dot.offline { background:var(--offline); box-shadow:0 0 5px rgba(255,34,68,.4); }

.tech-name {
  font-family:'DM Sans',sans-serif; font-size:.92rem; font-weight:700;
  color:var(--text); letter-spacing:-.01em; line-height:1.3;
}
.status-txt {
  font-family:'DM Mono',monospace; font-size:.58rem; font-weight:600;
}
.status-txt.online  { color:var(--online); }
.status-txt.offline { color:var(--offline); }

.tech-fullname { font-family:'DM Mono',monospace; font-size:.63rem; color:var(--muted); margin-top:.1rem; line-height:1.45; }
.tech-role     { font-family:'DM Mono',monospace; font-size:.63rem; color:var(--success); margin-top:.15rem; }

.card-tags { display:flex; flex-wrap:wrap; gap:.22rem; margin-top:.25rem; }
.tag {
  font-family:'DM Mono',monospace; font-size:.58rem;
  padding:.1rem .38rem; border-radius:5px; border:1px solid;
}
.tag-night   { color:#4d9fff;          border-color:rgba(30,100,255,.28); background:rgba(30,100,255,.07); }
.tag-obs     { color:var(--warn);      border-color:rgba(255,140,0,.28);  background:rgba(255,140,0,.07); }
.tag-ferias  { color:#F97316;          border-color:rgba(249,115,22,.28); background:rgba(249,115,22,.06); }

/* ── card actions ── */
.card-actions { display:flex; flex-direction:column; align-items:flex-end; gap:.38rem; flex-shrink:0; }

.action-btn {
  padding:.28rem .6rem; border-radius:7px;
  border:1px solid var(--border); background:transparent;
  color:var(--muted); font-family:'DM Sans',sans-serif;
  font-size:.65rem; font-weight:600; cursor:pointer;
  transition:all .15s; white-space:nowrap;
}
.action-btn:hover { border-color:var(--accent); color:var(--accent); }
.action-btn.copied { border-color:var(--success)!important; color:var(--success)!important; }
.action-btn.offline-on { border-color:var(--online)!important; color:var(--online)!important; }
.action-btn.offline-off:hover { border-color:var(--offline); color:var(--offline); }

/* wk check */
.wk-check {
  display:flex; align-items:center; gap:.28rem;
  padding:.22rem .48rem; border-radius:7px;
  border:1px solid rgba(217,70,239,.22); background:rgba(217,70,239,.04);
  cursor:pointer; user-select:none; transition:all .15s;
}
.wk-check:hover { border-color:var(--wk-color); }
.wk-check.on { border-color:var(--wk-color); background:rgba(217,70,239,.1); }
.wk-box {
  width:12px; height:12px; border-radius:3px;
  border:1.5px solid rgba(217,70,239,.4); background:transparent;
  display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0;
}
.wk-check.on .wk-box { background:var(--wk-color); border-color:var(--wk-color); }
.wk-check.on .wk-box::after { content:'✓'; font-size:.52rem; color:#fff; font-weight:800; }
.wk-lbl { font-family:'DM Mono',monospace; font-size:.56rem; color:rgba(217,70,239,.65); }
.wk-check.on .wk-lbl { color:var(--wk-color); }

/* busy toggle */
.busy-row { display:flex; align-items:center; gap:.28rem; }
.busy-toggle {
  display:flex; align-items:center; gap:2px;
  padding:3px 5px; border-radius:6px;
  border:1px solid var(--border); background:transparent; cursor:pointer;
  transition:border-color .15s;
}
.busy-toggle:hover { border-color:var(--border2); }
.busy-d { width:7px; height:7px; border-radius:50%; background:var(--border); transition:background .15s; }
.busy-toggle[data-lvl="1"] .busy-d:nth-child(-n+1) { background:var(--busy1); }
.busy-toggle[data-lvl="2"] .busy-d:nth-child(-n+2) { background:var(--busy2); }
.busy-toggle[data-lvl="3"] .busy-d:nth-child(-n+3) { background:var(--busy3); }
.busy-toggle[data-lvl="4"] .busy-d:nth-child(-n+4) { background:var(--busy4); }
.busy-toggle[data-lvl="5"] .busy-d:nth-child(-n+5) { background:var(--busy5); }

/* ══ TOAST ══ */
.toast {
  position:fixed; bottom:2rem; right:2rem; z-index:9999;
  background:var(--surface); border:1px solid rgba(0,201,122,.4);
  border-radius:12px; padding:.8rem 1.3rem;

}

/* ══ EVENTS ══ */
document.getElementById("areaToggleBtn").addEventListener("click",()=>{

  const o=p.classList.toggle("open");
  b.classList.toggle("open",o);
});

areasBtnsEl.addEventListener("click",e=>{
  const b=e.target.closest(".area-btn"); if(!b) return;
  const area=b.dataset.area;
  if(area==="Todas"){
    activeAreas=new Set(["Todas"]);
    document.querySelectorAll(".area-btn").forEach(x=>x.classList.remove("selected"));
    b.classList.add("selected");
  } else {
    activeAreas.delete("Todas");
    if(b.classList.contains("selected")){ b.classList.remove("selected"); activeAreas.delete(area);
      if(!activeAreas.size){ activeAreas.add("Todas"); document.querySelector('.area-btn[data-area="Todas"]').classList.add("selected"); }
    } else { b.classList.add("selected"); activeAreas.add(area); document.querySelector('.area-btn[data-area="Todas"]').classList.remove("selected"); }
  }
  updateAreaBadge(); renderAll();
});

document.getElementById("clearAreasBtn").addEventListener("click",()=>{

});

});
document.getElementById("weekendHdr").addEventListener("click",()=>{

});

document.getElementById("mainContent").addEventListener("click",e=>{
  const cb=e.target.closest(".copy-btn");
  if(cb){ const t=T.find(x=>x.nome===cb.dataset.key); if(!t) return;
    copyClip(cardText(t),()=>{ cb.textContent="✓ Copiado"; cb.classList.add("copied");
    setTimeout(()=>{ cb.textContent="⧉ Copiar"; cb.classList.remove("copied"); },2000);
    showToast("Dados copiados!"); }); return; }

  const ob=e.target.closest(".offline-btn");
  if(ob){ const k=ob.dataset.key; offlineState[k]=!offlineState[k]; renderAll(); renderBusy(); return; }

  const bt=e.target.closest(".busy-toggle");
  if(bt){ busyState[bt.dataset.key]=((busyState[bt.dataset.key]||0)+1)%6; renderAll(); renderBusy(); return; }

  const wk=e.target.closest(".wk-check");
  if(wk){ const k=wk.dataset.key; wkState[k]=!wkState[k]; renderAll(); renderWeekend(); return; }

  const rh=e.target.closest(".region-hdr");
  if(rh){ const id=rh.dataset.id; const sec=document.getElementById("rsec-"+id);
    if(sec){ sec.classList.toggle("collapsed"); const t=sec.querySelector(".region-toggle");

});

function updateAreaBadge(){
  const badge=document.getElementById("areaBadge"), clearBtn=document.getElementById("clearAreasBtn");
  if(activeAreas.has("Todas")||!activeAreas.size){ badge.textContent="Todas"; clearBtn.style.display="none"; }
  else { badge.textContent=activeAreas.size===1?[...activeAreas][0]:activeAreas.size+" áreas"; clearBtn.style.display=""; }
}

function nightVisible(){
  if(isEveningMode()) return !showNightOverride;
  return isNightActive()||showNightOverride;
}
function dayVisible(){
  if(isEveningMode()) return showNightOverride;
  return true;
}

  if(t.turno==="noite"&&!nightVisible()) return false;
  if(t.turno==="dia"&&!dayVisible()) return false;
  if(!activeAreas.has("Todas")&&!t.areas.some(a=>activeAreas.has(a))) return false;
  const q=document.getElementById("searchInput").value.toLowerCase();
  if(q&&!t.nome.toLowerCase().includes(q)&&!t.nc.toLowerCase().includes(q)&&!t.areas.some(a=>a.toLowerCase().includes(q))) return false;
  return true;
}

function cardText(t){
  const l=["NOME: "+t.nc];
  if(t.cpf) l.push("CPF: "+t.cpf);
  if(t.rg)  l.push("RG/IDENTIDADE: "+t.rg);
  if(t.crea) l.push("CREA: "+t.crea);
  return l.join("\n");
}

function copyClip(text,cb){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(cb).catch(()=>fbCopy(text,cb)); }
  else fbCopy(text,cb);
}
function fbCopy(text,cb){
  const ta=document.createElement("textarea"); ta.value=text;
  ta.style.cssText="position:fixed;top:0;left:0;opacity:0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand("copy"); cb(); } catch(e){}
  document.body.removeChild(ta);
}

function showToast(msg){
  document.getElementById("toastMsg").textContent=msg;
  const el=document.getElementById("toast"); el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2800);
}

function updateNightBtn(){
  const h=new Date().getHours(), eve=(h>=17||h<7);
  const b=document.getElementById("nightToggleBtn");
  b.classList.toggle("on",showNightOverride);
  b.textContent=eve
    ?(showNightOverride?"☀️ Ocultar diurnos":"☀️ Mostrar diurnos")
    :(showNightOverride?"🌙 Ocultar noturnos":"🌙 Mostrar noturnos");
}

/* ══ WEEKEND ══ */
function renderWeekend(){
  const slots=document.getElementById("weekendSlots");
  const panel=document.getElementById("weekendPanel");
  const list=T.filter(t=>wkState[t.nome]);
  document.getElementById("wkCount").textContent=list.length?"("+list.length+" confirmado"+(list.length>1?"s":"")+")" :"";
  if(!list.length){ slots.innerHTML='<div class="weekend-empty">Nenhum técnico marcado. Marque o ✓ Sáb/Dom no card.</div>'; return; }
  slots.innerHTML='<div class="weekend-slots">'+list.map(t=>
    '<div class="wk-slot"><div><div class="wk-slot-name">'+t.nome+'</div>'
    +'<div class="wk-slot-area">'+t.areas.slice(0,3).join(" · ")+(t.areas.length>3?" …":"")+'</div></div></div>'
  ).join('')+'</div>';
  if(!panel.classList.contains("collapsed")){
    const body=document.getElementById("weekendBody");
    body.style.maxHeight=body.scrollHeight+50+"px";
  }
}

/* ══ BUSY PANEL ══ */
function renderBusy(){
  const panel=document.getElementById("busyPanel"), list=document.getElementById("busyList");
  const ones=T.filter(t=>(busyState[t.nome]||0)>0||offlineState[t.nome]);
  panel.classList.toggle("active",ones.length>0);
  if(!ones.length) return;
  list.innerHTML=ones.map(t=>{
    const off=offlineState[t.nome], lvl=busyState[t.nome]||0;
    const col=off?"var(--offline)":BUSY_COLORS[lvl];
    const lbl=off?"🔴 Offline":(lvl>0?BUSY_LABELS[lvl]:"");
    return`<div class="busy-chip" style="background:${col}1a;border-color:${col};color:${col}">
      ${t.nome}${lbl?` <span style="font-size:.6rem;opacity:.8">${lbl}</span>`:''}
    </div>`;
  }).join('');
}

/* ══ SHIFT UI ══ */
function updateShiftUI(){
  const now=new Date(), h=now.getHours(), m=String(now.getMinutes()).padStart(2,"0");
  const night=isNightActive();
  document.body.classList.toggle("theme-night",night);
  document.getElementById("shiftIcon").textContent=night?"🌙":"☀️";
  document.getElementById("shiftLabel").textContent=night?"Turno Noturno":"Turno Diurno";
  document.getElementById("shiftClock").textContent=`${h}:${m}`+(night?" · até 07:00":" · noturno às 15:00");
  updateNightBtn();
  const warn=document.getElementById("shiftWarn");
  if(!night&&!showNightOverride){
    warn.classList.add("active");
    document.getElementById("shiftWarnText").textContent=`Técnicos noturnos entram às 15:00 — faltam ${NIGHT_START-h}h. Use 🌙 para visualizá-los.`;
  } else if(night&&!showNightOverride&&isEveningMode()){
    warn.classList.add("active");
    document.getElementById("shiftWarnText").textContent="Turno diurno encerrado. Use ☀️ para visualizá-los.";
  } else { warn.classList.remove("active"); }
}

/* ══ MAKE CARD ══ */
function makeCard(t){
  const lvl=busyState[t.nome]||0, isOff=!!offlineState[t.nome];
  const isWk=!!wkState[t.nome];
  const st=isOff?"offline":"online";
  const card=document.createElement("div");
  let cls="tech-card";
  if(t.turno==="noite") cls+=" night-card";
  if(isOff) cls+=" is-offline";
  else if(lvl>0) cls+=" busy-"+lvl;
  card.className=cls; card.dataset.region=t.reg;

  const dots='<div class="busy-d"></div>'.repeat(5);
  const blc=lvl>0?"l"+lvl:"";
  const blt=lvl>0?BUSY_LABELS[lvl]:"Livre";
  const showFull=t.nc.trim().toUpperCase()!==t.nome.trim().toUpperCase();

  card.innerHTML=
    `<div class="card-top">
      <div class="card-info">
        <div class="name-row">
          <div class="status-dot ${st}"></div>
          <div class="tech-name">${t.nome}</div>
          <span class="status-txt ${st}">${isOff?"Offline":"Online"}</span>
        </div>
        ${showFull?`<div class="tech-fullname">${t.nc}</div>`:''}
        <div class="tech-role">${t.cargo}</div>
        <div class="card-tags">
          ${t.turno==="noite"?'<span class="tag tag-night">🌙 15:00–23:00</span>':''}
          ${t.obs?`<span class="tag tag-obs">⚠ ${t.obs}</span>`:''}
        </div>
      </div>
      <div class="card-actions">
        <button class="action-btn copy-btn" data-key="${t.nome}">⧉ Copiar</button>
        <button class="action-btn offline-btn ${isOff?'offline-on':'offline-off'}" data-key="${t.nome}">${isOff?"🟢 Online":"🔴 Offline"}</button>
        <div class="wk-check${isWk?' on':''}" data-key="${t.nome}">
          <div class="wk-box"></div><span class="wk-lbl">Sáb/Dom</span>
        </div>
        <div class="busy-row">
          <button class="busy-toggle" data-lvl="${lvl}" data-key="${t.nome}">${dots}</button>
          <span class="busy-lbl ${blc}">${blt}</span>
        </div>
      </div>
    </div>
    ${t.cpf?`<div class="data-row"><span class="data-label">CPF</span><span class="data-val">${t.cpf}</span></div>`:''}
    ${t.rg?`<div class="data-row"><span class="data-label">RG</span><span class="data-val">${t.rg}</span></div>`:''}
    ${t.crea?`<div class="data-row"><span class="data-label">CREA</span><span class="data-val">${t.crea}</span></div>`:''}
    <div class="areas-tags">${t.areas.map(a=>`<span class="area-tag">${a}</span>`).join('')}</div>`;
  return card;
}

function makeDivider(cls, icon, lbl){
  const d=document.createElement("div"); d.className="turno-div";
  d.innerHTML=`<div class="turno-div-line"></div><span class="turno-div-pill ${cls}">${icon} ${lbl}</span><div class="turno-div-line"></div>`;
  return d;
}

/* ══ RENDER ALL ══ */
function renderAll(){
  updateShiftUI();
  const content=document.getElementById("mainContent"); content.innerHTML=""; let total=0;

  REGIOES.forEach(reg=>{
    const dia=T.filter(t=>t.reg===reg.id&&t.turno==="dia"&&shouldShow(t));
    const noite=T.filter(t=>t.reg===reg.id&&t.turno==="noite"&&shouldShow(t));
    if(!dia.length&&!noite.length) return;
    total+=dia.length+noite.length;

    const isCollapsed=!!collapseState[reg.id];
    const sec=document.createElement("div");
    sec.className="region-section"+(isCollapsed?" collapsed":"");
    sec.id="rsec-"+reg.id;

    const hdr=document.createElement("div");
    hdr.className="region-hdr"; hdr.dataset.id=reg.id;
    hdr.innerHTML=
      `<div class="region-dot" style="background:${reg.color}"></div>
       <span class="region-name" style="color:${reg.color}">${reg.label}</span>
       <span class="region-count" style="margin-left:.4rem">${dia.length+noite.length} técnico(s)</span>
       <span class="region-toggle">${isCollapsed?"▶":"▼"}</span>`;
    sec.appendChild(hdr);

    const body=document.createElement("div"); body.className="region-body";
    const grid=document.createElement("div"); grid.className="cards-grid";

    if(dia.length){
      if(noite.length) grid.appendChild(makeDivider("dia","☀️","08:00 – 17:00"));
      dia.forEach(t=>grid.appendChild(makeCard(t)));
    }
    if(noite.length){
      grid.appendChild(makeDivider("noite","🌙","15:00 – 23:00"));
      noite.forEach(t=>grid.appendChild(makeCard(t)));
    }
    body.appendChild(grid);
    if(!isCollapsed){ requestAnimationFrame(()=>{ body.style.maxHeight=body.scrollHeight+20+"px"; }); }
    else body.style.maxHeight="0";
    sec.appendChild(body); content.appendChild(sec);
  });

  document.getElementById("countDisplay").textContent=total;
  if(!total) content.innerHTML='<div class="empty-state"><div class="big">🗺️</div><p>Nenhum técnico encontrado.</p></div>';
}

/* ══ INIT ══ */
updateShiftUI(); renderAll(); renderBusy(); renderWeekend();
setInterval(()=>{ renderAll(); renderBusy(); }, 60000);
</script>
