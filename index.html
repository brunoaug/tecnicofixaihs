
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Técnicos por Área — RJ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #2a3a55;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --text: #e8edf5;
    --muted: #8899bb;
    --success: #00e5a0;
    --tag-bg: #0d2040;
    --busy1: #ffe066; --busy2: #ffb830; --busy3: #ff8c00; --busy4: #ff4d4d; --busy5: #cc0000;
    --rj-color: #00d4ff;
    --bxd-color: #a78bfa;
    --oeste-color: #34d399;
    --gnit-color: #fb923c;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% 0%, rgba(0,212,255,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,107,53,0.04) 0%, transparent 60%);
  }

  /* HEADER */
  header {
    padding:1.75rem 2rem 1.25rem; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;
  }
  .header-left { display:flex; align-items:flex-end; gap:1rem; }
  .logo-mark {
    width:42px; height:42px; background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:1.2rem; font-weight:800; color:#000; flex-shrink:0;
  }
  header h1 { font-size:1.4rem; font-weight:800; letter-spacing:-0.03em; }
  header p  { font-size:0.75rem; color:var(--muted); margin-top:2px; font-family:'JetBrains Mono',monospace; }
  .shift-badge {
    display:flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem;
    border-radius:10px; border:1px solid; font-family:'Syne',sans-serif;
    font-size:0.8rem; font-weight:700; flex-shrink:0;
  }
  .shift-badge.day   { border-color:rgba(255,212,0,0.4); background:rgba(255,212,0,0.07); color:#ffd400; }
  .shift-badge.night { border-color:rgba(100,160,255,0.4); background:rgba(100,160,255,0.07); color:#80aaff; }
  .shift-clock { font-size:0.66rem; font-family:'JetBrains Mono',monospace; opacity:.75; margin-top:1px; }

  .container { max-width:1300px; margin:0 auto; padding:1.75rem 2rem; }

  /* BANNERS */
  .shift-warn {
    background:rgba(100,160,255,0.07); border:1px solid rgba(100,160,255,0.2);
    border-radius:12px; padding:0.8rem 1.2rem; margin-bottom:1.25rem;
    display:flex; align-items:center; gap:0.75rem;
    font-size:0.78rem; color:#80aaff; font-family:'JetBrains Mono',monospace;
  }
  .info-banner {
    background:rgba(167,139,250,0.07); border:1px solid rgba(167,139,250,0.2);
    border-radius:12px; padding:0.8rem 1.2rem; margin-bottom:1.25rem;
    font-size:0.75rem; color:#c4b5fd; font-family:'JetBrains Mono',monospace; line-height:1.6;
  }
  .info-banner strong { color:#e9d5ff; }

  /* BUSY PANEL */
  .busy-panel {
    background:var(--surface); border:1px solid var(--border);
    border-radius:14px; padding:1rem 1.4rem; margin-bottom:1.25rem;
  }
  .busy-panel-title { font-size:0.68rem; font-family:'JetBrains Mono',monospace; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:.75rem; }
  .busy-list { display:flex; flex-wrap:wrap; gap:.5rem; }
  .busy-chip { display:flex; align-items:center; gap:.4rem; padding:.3rem .75rem; border-radius:999px; font-size:.75rem; font-weight:700; border:2px solid; }

  /* TOOLBAR */
  .toolbar { display:flex; align-items:center; gap:.75rem; margin-bottom:1rem; flex-wrap:wrap; }
  .search-bar { flex:1; min-width:200px; position:relative; }
  .search-bar input {
    width:100%; padding:.8rem 1rem .8rem 2.8rem;
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; color:var(--text); font-family:'JetBrains Mono',monospace;
    font-size:.85rem; outline:none; transition:border-color .2s;
  }
  .search-bar input:focus { border-color:var(--accent); }
  .search-bar .icon { position:absolute; left:.9rem; top:50%; transform:translateY(-50%); color:var(--muted); }

  /* BOTÕES TOOLBAR */
  .tb-btn {
    display:flex; align-items:center; gap:.45rem; padding:.5rem 1rem;
    border-radius:999px; border:1px solid var(--border); background:var(--surface);
    color:var(--muted); font-family:'Syne',sans-serif; font-size:.78rem; font-weight:700;
    cursor:pointer; transition:all .18s; white-space:nowrap; user-select:none;
  }
  .tb-btn:hover { border-color:var(--accent); color:var(--accent); }
  .tb-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(0,212,255,.07); }
  .tb-btn .chevron { font-style:normal; font-size:.7rem; transition:transform .25s; }
  .tb-btn.open .chevron { transform:rotate(180deg); }

  /* BOTÃO MOSTRAR NOTURNO */
  .tb-btn.night-btn { border-color:rgba(100,160,255,.35); color:#80aaff; }
  .tb-btn.night-btn:hover { border-color:#80aaff; background:rgba(100,160,255,.08); }
  .tb-btn.night-btn.active { background:rgba(100,160,255,.1); border-color:#80aaff; }

  .active-area-badge {
    font-size:.72rem; font-family:'JetBrains Mono',monospace; color:var(--accent);
    background:rgba(0,212,255,.1); border:1px solid rgba(0,212,255,.25);
    border-radius:6px; padding:.2rem .6rem;
  }

  /* AREAS PANEL */
  .areas-panel { overflow:hidden; max-height:0; transition:max-height .35s ease,opacity .25s ease,margin-bottom .25s; opacity:0; margin-bottom:0; }
  .areas-panel.open { max-height:600px; opacity:1; margin-bottom:1.25rem; }
  .areas-scroll { display:flex; flex-wrap:wrap; gap:.5rem; padding:.75rem 0 .25rem; }
  .area-btn {
    padding:.4rem .85rem; border-radius:999px; border:1px solid var(--border);
    background:var(--surface); color:var(--muted); font-family:'Syne',sans-serif;
    font-size:.76rem; font-weight:600; cursor:pointer; transition:all .18s; white-space:nowrap;
  }
  .area-btn:hover { border-color:var(--accent); color:var(--accent); }
  .area-btn.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }

  /* RESULTS HEADER */
  .results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:.5rem; }
  .results-count { font-size:.75rem; font-family:'JetBrains Mono',monospace; color:var(--muted); }
  .results-count span { color:var(--accent); font-weight:600; }
  .copy-all-btn {
    padding:.42rem 1rem; background:transparent; border:1px solid var(--accent2);
    border-radius:8px; color:var(--accent2); font-family:'Syne',sans-serif;
    font-size:.75rem; font-weight:700; cursor:pointer; transition:all .18s;
  }
  .copy-all-btn:hover { background:var(--accent2); color:#000; }

  /* REGION SECTION */
  .region-section { margin-bottom:2rem; }
  .region-header {
    display:flex; align-items:center; gap:.75rem; margin-bottom:1rem; padding-bottom:.6rem;
    border-bottom:1px solid var(--border);
  }
  .region-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .region-title { font-size:1rem; font-weight:800; letter-spacing:-.02em; }
  .region-count { font-size:.68rem; font-family:'JetBrains Mono',monospace; color:var(--muted); margin-left:auto; }

  /* TURNO DIVIDER dentro de uma região */
  .turno-divider {
    display:flex; align-items:center; gap:.6rem; margin:1rem 0 .75rem;
  }
  .turno-divider-line { flex:1; height:1px; background:var(--border); }
  .turno-divider-label {
    font-size:.63rem; font-family:'JetBrains Mono',monospace; letter-spacing:.1em;
    text-transform:uppercase; white-space:nowrap; padding:.22rem .65rem;
    border-radius:999px; border:1px solid;
  }
  .turno-divider-label.day   { color:#ffd400; border-color:rgba(255,212,0,.3); background:rgba(255,212,0,.06); }
  .turno-divider-label.night { color:#80aaff; border-color:rgba(100,160,255,.3); background:rgba(100,160,255,.06); }

  /* CARDS */
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:.9rem; }
  .tech-card {
    background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:1.2rem 1.35rem; transition:border-color .2s,transform .15s,box-shadow .2s;
    position:relative; overflow:hidden;
  }
  .tech-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    opacity:0; transition:opacity .2s;
  }
  .tech-card:hover { transform:translateY(-2px); }
  .tech-card:hover::before { opacity:1; }

  /* região color per card */
  .tech-card[data-region="RJ"]    { --rc:var(--rj-color); }
  .tech-card[data-region="BXD"]   { --rc:var(--bxd-color); }
  .tech-card[data-region="OESTE"] { --rc:var(--oeste-color); }
  .tech-card[data-region="GNIT"]  { --rc:var(--gnit-color); }
  .tech-card:hover { border-color:var(--rc,var(--accent)); }
  .tech-card::before { background:var(--rc,var(--accent)); }

  .tech-card.night-card { border-color:rgba(100,160,255,.25); }
  .tech-card.busy-1 { border-color:var(--busy1)!important; box-shadow:0 0 14px rgba(255,224,102,.18); }
  .tech-card.busy-2 { border-color:var(--busy2)!important; box-shadow:0 0 14px rgba(255,184,48,.22); }
  .tech-card.busy-3 { border-color:var(--busy3)!important; box-shadow:0 0 16px rgba(255,140,0,.28); }
  .tech-card.busy-4 { border-color:var(--busy4)!important; box-shadow:0 0 18px rgba(255,77,77,.32); }
  .tech-card.busy-5 { border-color:var(--busy5)!important; box-shadow:0 0 22px rgba(204,0,0,.38); }
  .tech-card.busy-1::before { opacity:1!important; background:var(--busy1); }
  .tech-card.busy-2::before { opacity:1!important; background:var(--busy2); }
  .tech-card.busy-3::before { opacity:1!important; background:var(--busy3); }
  .tech-card.busy-4::before { opacity:1!important; background:var(--busy4); }
  .tech-card.busy-5::before { opacity:1!important; background:var(--busy5); }

  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.85rem; }
  .tech-name { font-size:.97rem; font-weight:700; letter-spacing:-.02em; line-height:1.3; }
  .tech-full-name { font-size:.67rem; font-family:'JetBrains Mono',monospace; color:var(--muted); margin-top:.15rem; line-height:1.4; }
  .tech-role { font-size:.67rem; font-family:'JetBrains Mono',monospace; color:var(--success); margin-top:.2rem; }
  .night-tag { font-size:.6rem; font-family:'JetBrains Mono',monospace; color:#80aaff; background:rgba(100,160,255,.1); border:1px solid rgba(100,160,255,.25); border-radius:4px; padding:.15rem .45rem; margin-top:.25rem; display:inline-block; }
  .ferias-tag { font-size:.6rem; font-family:'JetBrains Mono',monospace; color:#fb923c; background:rgba(251,146,60,.1); border:1px solid rgba(251,146,60,.3); border-radius:4px; padding:.15rem .45rem; margin-top:.25rem; display:inline-block; margin-left:.25rem; }

  .card-actions { display:flex; flex-direction:column; align-items:flex-end; gap:.5rem; flex-shrink:0; margin-left:.6rem; }
  .copy-btn {
    padding:.32rem .72rem; background:transparent; border:1px solid var(--border);
    border-radius:7px; color:var(--muted); font-family:'Syne',sans-serif;
    font-size:.7rem; font-weight:600; cursor:pointer; transition:all .15s; white-space:nowrap;
  }
  .copy-btn:hover { border-color:var(--accent); color:var(--accent); }
  .copy-btn.copied { border-color:var(--success)!important; color:var(--success)!important; }

  .busy-row { display:flex; align-items:center; gap:.35rem; }
  .busy-toggle { display:flex; align-items:center; gap:3px; cursor:pointer; user-select:none; padding:4px 6px; border-radius:6px; border:1px solid var(--border); background:transparent; transition:border-color .15s; }
  .busy-toggle:hover { border-color:var(--muted); }
  .busy-dot { width:9px; height:9px; border-radius:50%; background:#2a3a55; transition:background .15s; }
  .busy-toggle[data-level="1"] .busy-dot:nth-child(-n+1) { background:var(--busy1); }
  .busy-toggle[data-level="2"] .busy-dot:nth-child(-n+2) { background:var(--busy2); }
  .busy-toggle[data-level="3"] .busy-dot:nth-child(-n+3) { background:var(--busy3); }
  .busy-toggle[data-level="4"] .busy-dot:nth-child(-n+4) { background:var(--busy4); }
  .busy-toggle[data-level="5"] .busy-dot:nth-child(-n+5) { background:var(--busy5); }
  .busy-label { font-size:.6rem; font-family:'JetBrains Mono',monospace; color:var(--muted); white-space:nowrap; }
  .busy-label.l1{color:var(--busy1);} .busy-label.l2{color:var(--busy2);} .busy-label.l3{color:var(--busy3);} .busy-label.l4{color:var(--busy4);} .busy-label.l5{color:var(--busy5);}

  .data-row { display:flex; gap:.5rem; align-items:baseline; margin-bottom:.3rem; }
  .data-label { font-size:.63rem; font-family:'JetBrains Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; min-width:48px; flex-shrink:0; }
  .data-val   { font-size:.77rem; font-family:'JetBrains Mono',monospace; color:var(--text); }

  .areas-tags { margin-top:.9rem; display:flex; flex-wrap:wrap; gap:.3rem; }
  .area-tag { font-size:.63rem; font-family:'JetBrains Mono',monospace; background:var(--tag-bg); border:1px solid var(--border); border-radius:5px; padding:.18rem .48rem; color:var(--muted); }
  .obs-tag  { font-size:.63rem; font-family:'JetBrains Mono',monospace; background:rgba(255,107,53,.1); border:1px solid rgba(255,107,53,.3); border-radius:5px; padding:.18rem .48rem; color:var(--accent2); margin-top:.5rem; display:inline-block; }

  .empty-state { text-align:center; padding:4rem 2rem; color:var(--muted); }
  .empty-state .big { font-size:3rem; margin-bottom:.5rem; }

  .toast {
    position:fixed; bottom:2rem; right:2rem; background:var(--success); color:#000;
    font-family:'Syne',sans-serif; font-weight:700; font-size:.85rem;
    padding:.75rem 1.5rem; border-radius:10px;
    transform:translateY(100px); opacity:0; transition:all .3s cubic-bezier(.34,1.56,.64,1); z-index:999;
  }
  .toast.show { transform:translateY(0); opacity:1; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-mark">RJ</div>
    <div>
      <h1>Técnicos por Área</h1>
      <p>Rio de Janeiro · Telecom Field Team</p>
    </div>
  </div>

</header>

<div class="container">

  <div class="areas-panel" id="areasPanel">

  <div class="results-header">

  </div>

  <div id="mainContent"></div>
</div>

<div class="toast" id="toast"></div>

// ─── AREAS ───────────────────────────────────────────────────────────────────
const allAreas = ["Todas"];
tecnicos.forEach(t => { t.areas.forEach(a => { if (!allAreas.includes(a)) allAreas.push(a); }); });
const areasBtnsEl = document.getElementById("areasBtns");
allAreas.forEach(area => {
  const btn = document.createElement("button");
  btn.className = "area-btn" + (area === "Todas" ? " active" : "");
  btn.textContent = area; btn.dataset.area = area;
  areasBtnsEl.appendChild(btn);
});

const busyLabels = ["","Pouco ocupado","Ocupado","Bem ocupado","Muito ocupado","Indisponível"];
const busyColors = ["","var(--busy1)","var(--busy2)","var(--busy3)","var(--busy4)","var(--busy5)"];

// ─── EVENTOS ─────────────────────────────────────────────────────────────────
document.getElementById("areaToggleBtn").addEventListener("click", () => {
  const panel = document.getElementById("areasPanel");
  const btn   = document.getElementById("areaToggleBtn");
  const open  = panel.classList.toggle("open");
  btn.classList.toggle("open", open);
});

areasBtnsEl.addEventListener("click", e => {
  const btn = e.target.closest(".area-btn"); if (!btn) return;
  activeArea = btn.dataset.area;
  document.querySelectorAll(".area-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("activeAreaBadge").textContent = activeArea;
  renderAll();
});

document.getElementById("searchInput").addEventListener("input", renderAll);

document.getElementById("nightToggleBtn").addEventListener("click", () => {
  showNightOverride = !showNightOverride;
  const btn = document.getElementById("nightToggleBtn");
  btn.classList.toggle("active", showNightOverride);
  btn.textContent = showNightOverride ? "🌙 Ocultar noturnos" : "🌙 Mostrar noturnos";
  renderAll();
});

document.getElementById("copyAllBtn").addEventListener("click", () => {
  const all = getFilteredAll();
  copyToClipboard(all.map(t => cardText(t)).join("\n\n---\n\n"), () => showToast(all.length + " técnico(s) copiados!"));
});

document.getElementById("mainContent").addEventListener("click", e => {
  const cb = e.target.closest(".copy-btn");
  if (cb) {
    const t = tecnicos.find(x => x.nome === cb.dataset.key);
    if (!t) return;
    copyToClipboard(cardText(t), () => {
      cb.textContent = "✓ Copiado"; cb.classList.add("copied");
      setTimeout(() => { cb.textContent = "⧉ Copiar"; cb.classList.remove("copied"); }, 2000);
      showToast("Dados copiados!");
    });
    return;
  }
  const bb = e.target.closest(".busy-toggle");
  if (bb) {
    busyState[bb.dataset.key] = ((busyState[bb.dataset.key] || 0) + 1) % 6;
    renderAll(); renderBusyPanel();
  }
});

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function nightVisible() { return isNightActive() || showNightOverride; }

function shouldShow(t) {
  if (t.turno === "noite" && !nightVisible()) return false;
  if (activeArea !== "Todas" && !t.areas.includes(activeArea)) return false;
  const q = document.getElementById("searchInput").value.toLowerCase();
  if (q && !t.nome.toLowerCase().includes(q) && !t.nomeCompleto.toLowerCase().includes(q) && !t.areas.some(a => a.toLowerCase().includes(q))) return false;
  return true;
}

function getFilteredAll() { return tecnicos.filter(shouldShow); }

function cardText(t) {
  const lines = ["NOME: " + t.nomeCompleto];
  if (t.cpf)  lines.push("CPF: " + t.cpf);
  if (t.rg)   lines.push("RG/IDENTIDADE: " + t.rg);
  if (t.crea) lines.push("CREA: " + t.crea);
  return lines.join("\n");
}

function copyToClipboard(text, cb) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(cb).catch(() => fbCopy(text, cb));
  } else fbCopy(text, cb);
}
function fbCopy(text, cb) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.cssText = "position:fixed;top:0;left:0;opacity:0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand("copy"); cb(); } catch(e) {}
  document.body.removeChild(ta);
}

function showToast(msg) {
  const el = document.getElementById("toast"); el.textContent = msg;
  el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2500);
}

function makeCard(t) {
  const lvl = busyState[t.nome] || 0;
  const card = document.createElement("div");
  let cls = "tech-card";
  if (t.turno === "noite") cls += " night-card";
  if (lvl > 0) cls += " busy-" + lvl;
  card.className = cls;
  card.dataset.region = t.regiao;

  const dots = '<div class="busy-dot"></div>'.repeat(5);
  const blc  = lvl > 0 ? "l" + lvl : "";
  const blt  = lvl > 0 ? busyLabels[lvl] : "Livre";
  const showFull = t.nomeCompleto.trim().toUpperCase() !== t.nome.trim().toUpperCase();

  card.innerHTML =
    '<div class="card-top">'
      + '<div>'
        + '<div class="tech-name">' + t.nome + '</div>'
        + (showFull ? '<div class="tech-full-name">' + t.nomeCompleto + '</div>' : '')
        + '<div class="tech-role">' + t.cargo + '</div>'
        + (t.turno === "noite" ? '<span class="night-tag">🌙 15:00–23:00</span>' : '')
        + (t.ferias ? '<span class="ferias-tag">🏖 FÉRIAS</span>' : '')
      + '</div>'
      + '<div class="card-actions">'
        + '<button class="copy-btn" data-key="' + t.nome + '">⧉ Copiar</button>'
        + '<div class="busy-row">'
          + '<button class="busy-toggle" data-level="' + lvl + '" data-key="' + t.nome + '">' + dots + '</button>'
          + '<span class="busy-label ' + blc + '">' + blt + '</span>'
        + '</div>'
      + '</div>'
    + '</div>'
    + (t.cpf  ? '<div class="data-row"><span class="data-label">CPF</span><span class="data-val">' + t.cpf  + '</span></div>' : '')
    + (t.rg   ? '<div class="data-row"><span class="data-label">RG</span><span class="data-val">'  + t.rg   + '</span></div>' : '')
    + (t.crea ? '<div class="data-row"><span class="data-label">CREA</span><span class="data-val">'+ t.crea + '</span></div>' : '')
    + '<div class="areas-tags">' + t.areas.map(a => '<span class="area-tag">' + a + '</span>').join('') + '</div>'
    + (t.obs  ? '<div class="obs-tag">⚠ ' + t.obs + '</div>' : '');

  return card;
}

function makeDivider(cls, icon, label) {
  const d = document.createElement("div");
  d.className = "turno-divider";
  d.innerHTML = '<div class="turno-divider-line"></div>'
    + '<span class="turno-divider-label ' + cls + '">' + icon + ' ' + label + '</span>'
    + '<div class="turno-divider-line"></div>';
  return d;
}

// ─── RENDER BUSY ─────────────────────────────────────────────────────────────
function renderBusyPanel() {
  const panel = document.getElementById("busyPanel");
  const list  = document.getElementById("busyList");
  const ones  = tecnicos.filter(t => (busyState[t.nome] || 0) > 0);
  if (!ones.length) { panel.style.display = "none"; return; }
  panel.style.display = "";
  list.innerHTML = ones.map(t => {
    const lvl = busyState[t.nome], col = busyColors[lvl];
    return '<div class="busy-chip" style="background:' + col + '22;border-color:' + col + ';color:' + col + '">'
      + t.nome + ' <span style="font-size:.65rem;opacity:.85">' + busyLabels[lvl] + '</span></div>';
  }).join('');
}

// ─── RENDER SHIFT UI ─────────────────────────────────────────────────────────
function updateShiftUI() {
  const now = new Date(), h = now.getHours(), m = String(now.getMinutes()).padStart(2,"0");
  const night = isNightActive();
  const badge = document.getElementById("shiftBadge");
  badge.className = "shift-badge " + (night ? "night" : "day");
  document.getElementById("shiftIcon").textContent  = night ? "🌙" : "☀️";
  document.getElementById("shiftLabel").textContent = night ? "Turno Noturno" : "Turno Diurno";
  document.getElementById("shiftClock").textContent = h + ":" + m + (night ? " · até 23:00" : " · noturno às 15:00");

  const warn = document.getElementById("shiftWarn");
  if (!night && !showNightOverride) {
    warn.style.display = "flex";
    const txt = h < NIGHT_START
      ? "Técnicos noturnos entram às 15:00 — faltam " + (NIGHT_START - h) + "h. Use o botão 🌙 para visualizá-los."
      : "Turno noturno encerrado (após 23:00). Use o botão 🌙 para visualizá-los.";
    document.getElementById("shiftWarnText").textContent = txt;
  } else {
    warn.style.display = "none";
  }
}

// ─── RENDER MAIN ─────────────────────────────────────────────────────────────
function renderAll() {
  updateShiftUI();
  const content = document.getElementById("mainContent");
  content.innerHTML = "";
  let total = 0;

  REGIOES.forEach(reg => {
    const diurnos  = tecnicos.filter(t => t.regiao === reg.id && t.turno === "dia"   && shouldShow(t));
    const noturnos = tecnicos.filter(t => t.regiao === reg.id && t.turno === "noite" && shouldShow(t));
    if (!diurnos.length && !noturnos.length) return;

    total += diurnos.length + noturnos.length;

    const section = document.createElement("div");
    section.className = "region-section";

    // Header da região
    const rh = document.createElement("div");
    rh.className = "region-header";
    rh.innerHTML = '<div class="region-dot" style="background:' + reg.color + '"></div>'
      + '<span class="region-title" style="color:' + reg.color + '">' + reg.label + '</span>'
      + '<span class="region-count">' + (diurnos.length + noturnos.length) + ' técnico(s)</span>';
    section.appendChild(rh);

    const grid = document.createElement("div");
    grid.className = "cards-grid";

    // Diurnos
    if (diurnos.length) {
      if (noturnos.length) grid.appendChild(makeDivider("day","☀️","08:00 – 17:00"));
      diurnos.forEach(t => grid.appendChild(makeCard(t)));
    }

    // Noturnos
    if (noturnos.length) {
      grid.appendChild(makeDivider("night","🌙","15:00 – 23:00"));
      noturnos.forEach(t => grid.appendChild(makeCard(t)));
    }

    section.appendChild(grid);
    content.appendChild(section);
  });

  document.getElementById("countDisplay").textContent = total;
  if (!total) {
    content.innerHTML = '<div class="empty-state"><div class="big">🗺️</div><p>Nenhum técnico encontrado.</p></div>';
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────
renderAll();
renderBusyPanel();
setInterval(() => { renderAll(); }, 60000);
