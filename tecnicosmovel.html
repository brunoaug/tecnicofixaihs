
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipe Móvel — RJ</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══ TEMA DIURNO (7:00–15:00): laranja opaco principal, azul escuro contraste ══ */
:root{
  --bg:#110d08;--surface:#1c1409;--card:#251a0c;--border:#3a2510;
  --accent:#cc5520;--accent2:#1a4a8a;--text:#ede0d4;--muted:#8a6a50;
  --success:#00e5a0;--tag-bg:#1a0e05;
  --busy1:#ffe066;--busy2:#ffb830;--busy3:#ff8c00;--busy4:#ff4d4d;--busy5:#cc0000;
  --oeste-color:#cc5520;--bxd-color:#a78bfa;--niteroi-color:#34d399;--interior-color:#f0abfc;--es-color:#60a5fa;
  --online:#00e5a0;--offline:#ff4d4d;
  --grad1:rgba(180,75,30,.08);--grad2:rgba(26,74,138,.04);
  --logo-a:#cc5520;--logo-b:#1a4a8a;
  --wk-color:#f0abfc;
}
/* ══ TEMA NOTURNO (15:00–7:00): azul escuro principal, laranja contraste ══ */
body.theme-night{
  --bg:#050c1a;--surface:#0a1525;--card:#0f1d35;--border:#1a3055;
  --accent:#1a6aff;--accent2:#ff6b35;--text:#d0ddf5;--muted:#5a7aaa;
  --tag-bg:#060f20;
  --oeste-color:#4d9fff;--grad1:rgba(26,106,255,.06);--grad2:rgba(255,107,53,.04);
  --logo-a:#4d9fff;--logo-b:#ff6b35;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;
  transition:background .6s,color .4s;
  background-image:radial-gradient(ellipse 80% 50% at 20% 0%,var(--grad1) 0%,transparent 60%),
  radial-gradient(ellipse 60% 40% at 80% 100%,var(--grad2) 0%,transparent 60%);}

/* HEADER */
header{padding:1.5rem 2rem 1.2rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;
  transition:border-color .5s,background .5s;}
.header-left{display:flex;align-items:flex-end;gap:1rem;}
.logo-mark{width:42px;height:42px;background:linear-gradient(135deg,var(--logo-a),var(--logo-b));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:800;color:#fff;flex-shrink:0;}
header h1{font-size:1.4rem;font-weight:800;letter-spacing:-.03em;}
header p{font-size:.75rem;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace;}
.shift-badge{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;
  border-radius:10px;border:1px solid;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;flex-shrink:0;}
.shift-badge.day{border-color:rgba(180,75,30,.5);background:rgba(180,75,30,.1);color:#cc5520;}
.shift-badge.night{border-color:rgba(26,106,255,.45);background:rgba(26,106,255,.1);color:#4d9fff;}
.shift-clock{font-size:.66rem;font-family:'JetBrains Mono',monospace;opacity:.75;margin-top:1px;}

.container{max-width:1300px;margin:0 auto;padding:1.5rem 2rem;}

/* SHIFT WARN */
.shift-warn{background:rgba(26,106,255,.07);border:1px solid rgba(26,106,255,.2);
  border-radius:12px;padding:.75rem 1.2rem;margin-bottom:1.1rem;
  display:flex;align-items:center;gap:.75rem;
  font-size:.77rem;color:#4d9fff;font-family:'JetBrains Mono',monospace;}
body:not(.theme-night) .shift-warn{background:rgba(180,75,30,.07);border-color:rgba(180,75,30,.2);color:#cc5520;}

/* BUSY PANEL */
.busy-panel{background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:.9rem 1.3rem;margin-bottom:1.1rem;}
.busy-panel-title{font-size:.67rem;font-family:'JetBrains Mono',monospace;
  color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.65rem;}
.busy-list{display:flex;flex-wrap:wrap;gap:.45rem;}
.busy-chip{display:flex;align-items:center;gap:.35rem;padding:.28rem .7rem;
  border-radius:999px;font-size:.73rem;font-weight:700;border:2px solid;}

/* WEEKEND PANEL */
.weekend-panel{background:rgba(240,171,252,.05);border:1px solid rgba(240,171,252,.2);
  border-radius:14px;padding:1rem 1.4rem;margin-bottom:1.1rem;}
.weekend-panel-header{display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;gap:.75rem;}
.weekend-panel-title{font-size:.82rem;font-weight:700;color:var(--wk-color);
  display:flex;align-items:center;gap:.5rem;}
.weekend-panel-chevron{font-size:.7rem;color:var(--wk-color);transition:transform .25s;font-style:normal;}
.weekend-panel.collapsed .weekend-panel-chevron{transform:rotate(-90deg);}
.weekend-body{margin-top:.9rem;overflow:hidden;transition:max-height .3s ease,opacity .25s;}
.weekend-panel.collapsed .weekend-body{max-height:0!important;opacity:0;margin-top:0;}
.weekend-empty{font-size:.75rem;font-family:'JetBrains Mono',monospace;color:var(--muted);
  padding:.5rem 0;font-style:italic;}
.weekend-slots{display:flex;flex-wrap:wrap;gap:.6rem;}
.wk-slot{display:flex;align-items:center;gap:.5rem;padding:.45rem .9rem;
  border-radius:10px;border:1px solid rgba(240,171,252,.25);background:rgba(240,171,252,.06);}
.wk-slot-name{font-size:.8rem;font-weight:700;color:var(--wk-color);}
.wk-slot-area{font-size:.65rem;font-family:'JetBrains Mono',monospace;color:var(--muted);}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:.65rem;margin-bottom:.75rem;flex-wrap:wrap;}
.search-bar{flex:1;min-width:180px;position:relative;}
.search-bar input{width:100%;padding:.75rem 1rem .75rem 2.6rem;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.84rem;
  outline:none;transition:border-color .2s;}
.search-bar input:focus{border-color:var(--accent);}
.search-bar .icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);}
.tb-btn{display:flex;align-items:center;gap:.4rem;padding:.47rem .95rem;
  border-radius:999px;border:1px solid var(--border);background:var(--surface);
  color:var(--muted);font-family:'Syne',sans-serif;font-size:.77rem;font-weight:700;
  cursor:pointer;transition:all .18s;white-space:nowrap;user-select:none;}
.tb-btn:hover{border-color:var(--accent);color:var(--accent);}
.tb-btn.open{border-color:var(--accent);color:var(--accent);background:rgba(0,0,0,.15);}
.tb-btn .chevron{font-style:normal;font-size:.68rem;transition:transform .25s;}
.tb-btn.open .chevron{transform:rotate(180deg);}
.tb-btn.night-btn{border-color:rgba(26,106,255,.35);color:#4d9fff;}
.tb-btn.night-btn:hover,.tb-btn.night-btn.active{border-color:#4d9fff;background:rgba(26,106,255,.1);color:#4d9fff;}
.copy-all-btn{padding:.42rem .95rem;background:transparent;border:1px solid var(--accent2);
  border-radius:8px;color:var(--accent2);font-family:'Syne',sans-serif;font-size:.74rem;
  font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap;}
.copy-all-btn:hover{background:var(--accent2);color:#fff;}
body:not(.theme-night) .copy-all-btn:hover{color:#fff;}
.active-area-badge{font-size:.7rem;font-family:'JetBrains Mono',monospace;color:var(--accent);
  background:rgba(128,128,128,.12);border:1px solid var(--accent);border-radius:6px;padding:.18rem .55rem;opacity:.8;}
.tb-btn.clear-areas-btn{border-color:var(--accent);color:var(--accent);background:rgba(0,0,0,.2);align-items:center;}
.tb-btn.clear-areas-btn:hover{opacity:.85;}
.home-btn{display:flex;align-items:center;gap:.4rem;padding:.47rem .95rem;
  border-radius:999px;border:1px solid var(--border);background:var(--surface);
  color:var(--muted);font-family:'Syne',sans-serif;font-size:.77rem;font-weight:700;
  cursor:pointer;transition:all .18s;white-space:nowrap;text-decoration:none;user-select:none;}
.home-btn:hover{border-color:var(--accent2);color:var(--accent2);}

/* AREAS */
.areas-panel{overflow:hidden;max-height:0;transition:max-height .35s ease,opacity .25s,margin-bottom .25s;opacity:0;margin-bottom:0;}
.areas-panel.open{max-height:700px;opacity:1;margin-bottom:1.1rem;}
.areas-scroll{display:flex;flex-wrap:wrap;gap:.45rem;padding:.7rem 0 .3rem;}
.area-btn{padding:.38rem .82rem;border-radius:999px;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);font-family:'Syne',sans-serif;
  font-size:.74rem;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;}
.area-btn:hover{border-color:var(--accent);color:var(--accent);}
.area-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;}
body:not(.theme-night) .area-btn.selected{color:#1a0800;}

.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;flex-wrap:wrap;gap:.4rem;}
.results-count{font-size:.74rem;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.results-count span{color:var(--accent);font-weight:600;}

/* REGION */
.region-section{margin-bottom:1.75rem;}
.region-header{display:flex;align-items:center;gap:.7rem;margin-bottom:.9rem;
  padding-bottom:.55rem;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.region-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.region-title{font-size:.97rem;font-weight:800;letter-spacing:-.02em;}
.region-count{font-size:.67rem;font-family:'JetBrains Mono',monospace;color:var(--muted);}
.region-collapse-btn{margin-left:auto;font-size:.7rem;color:var(--muted);
  background:none;border:none;cursor:pointer;padding:.2rem .4rem;
  border-radius:5px;transition:all .15s;font-style:normal;}
.region-header:hover .region-collapse-btn{color:var(--accent);}
.region-body{overflow:hidden;transition:max-height .35s ease,opacity .25s;}
.region-body.collapsed{max-height:0!important;opacity:0;}

/* TURNO DIVIDER */
.turno-divider{display:flex;align-items:center;gap:.55rem;margin:.9rem 0 .7rem;}
.turno-divider-line{flex:1;height:1px;background:var(--border);}
.turno-divider-label{font-size:.62rem;font-family:'JetBrains Mono',monospace;letter-spacing:.1em;
  text-transform:uppercase;white-space:nowrap;padding:.2rem .6rem;border-radius:999px;border:1px solid;}
.turno-divider-label.day{color:#b84a1a;border-color:rgba(180,75,30,.4);background:rgba(180,75,30,.08);}
.turno-divider-label.night{color:#4d9fff;border-color:rgba(26,106,255,.35);background:rgba(26,106,255,.08);}
.turno-divider-label.fds{color:var(--wk-color);border-color:rgba(240,171,252,.35);background:rgba(240,171,252,.08);}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.85rem;}
.tech-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:1.1rem 1.25rem;transition:border-color .2s,transform .15s,box-shadow .2s,opacity .25s,filter .25s,background .5s;
  position:relative;overflow:hidden;}
.tech-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s;}
.tech-card:not(.is-offline):hover{transform:translateY(-2px);}
.tech-card:not(.is-offline):hover::before{opacity:1;}
.tech-card[data-region="OESTE"]{--rc:var(--oeste-color);}
.tech-card[data-region="BXD"]{--rc:var(--bxd-color);}
.tech-card[data-region="NITEROI"]{--rc:var(--niteroi-color);}
.tech-card[data-region="GRANDE_RIO"]{--rc:#f59e0b;}
.tech-card[data-region="INTERIOR"]{--rc:var(--interior-color);}
.tech-card[data-region="ES"]{--rc:var(--es-color);}
.tech-card::before{background:var(--rc,var(--accent));}
.tech-card:not(.is-offline):hover{border-color:var(--rc,var(--accent));}
.tech-card.night-card{border-color:rgba(26,106,255,.22);}
.tech-card.fds-only{border-color:rgba(240,171,252,.22);}
.tech-card.is-offline{opacity:.4;filter:grayscale(.65);}
.tech-card.is-offline::before{background:var(--offline)!important;opacity:1!important;}
.tech-card.is-offline{border-color:rgba(255,77,77,.3)!important;}
.tech-card.busy-1{border-color:var(--busy1)!important;box-shadow:0 0 12px rgba(255,224,102,.18);}
.tech-card.busy-2{border-color:var(--busy2)!important;box-shadow:0 0 12px rgba(255,184,48,.22);}
.tech-card.busy-3{border-color:var(--busy3)!important;box-shadow:0 0 14px rgba(255,140,0,.28);}
.tech-card.busy-4{border-color:var(--busy4)!important;box-shadow:0 0 16px rgba(255,77,77,.32);}
.tech-card.busy-5{border-color:var(--busy5)!important;box-shadow:0 0 20px rgba(204,0,0,.38);}
.tech-card.busy-1::before{opacity:1!important;background:var(--busy1);}
.tech-card.busy-2::before{opacity:1!important;background:var(--busy2);}
.tech-card.busy-3::before{opacity:1!important;background:var(--busy3);}
.tech-card.busy-4::before{opacity:1!important;background:var(--busy4);}
.tech-card.busy-5::before{opacity:1!important;background:var(--busy5);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.8rem;}
.card-info{flex:1;min-width:0;}
.card-name-row{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s,box-shadow .3s;}
.status-dot.online{background:var(--online);box-shadow:0 0 6px rgba(0,229,160,.55);}
.status-dot.offline{background:var(--offline);box-shadow:0 0 5px rgba(255,77,77,.4);}
.tech-name{font-size:.95rem;font-weight:700;letter-spacing:-.02em;line-height:1.3;}
.status-text{font-size:.6rem;font-family:'JetBrains Mono',monospace;font-weight:600;}
.status-text.online{color:var(--online);}.status-text.offline{color:var(--offline);}
.tech-full-name{font-size:.66rem;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-top:.12rem;line-height:1.4;}
.tech-role{font-size:.66rem;font-family:'JetBrains Mono',monospace;color:var(--success);margin-top:.18rem;}
.card-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.28rem;}
.night-tag{font-size:.59rem;font-family:'JetBrains Mono',monospace;color:#4d9fff;background:rgba(26,106,255,.1);border:1px solid rgba(26,106,255,.25);border-radius:4px;padding:.12rem .4rem;}
.fds-tag{font-size:.59rem;font-family:'JetBrains Mono',monospace;color:var(--wk-color);background:rgba(240,171,252,.1);border:1px solid rgba(240,171,252,.25);border-radius:4px;padding:.12rem .4rem;}
.coord-tag{font-size:.59rem;font-family:'JetBrains Mono',monospace;color:#fbbf24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:4px;padding:.12rem .4rem;}
.tlp-tag{font-size:.59rem;font-family:'JetBrains Mono',monospace;color:#a78bfa;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.25);border-radius:4px;padding:.12rem .4rem;}
.card-actions{display:flex;flex-direction:column;align-items:flex-end;gap:.42rem;flex-shrink:0;margin-left:.55rem;}
.copy-btn{padding:.3rem .65rem;background:transparent;border:1px solid var(--border);
  border-radius:7px;color:var(--muted);font-family:'Syne',sans-serif;font-size:.68rem;
  font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.copy-btn.copied{border-color:var(--success)!important;color:var(--success)!important;}
.offline-btn{padding:.3rem .65rem;background:transparent;border:1px solid var(--border);
  border-radius:7px;color:var(--muted);font-family:'Syne',sans-serif;font-size:.68rem;
  font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.offline-btn:hover{border-color:var(--offline);color:var(--offline);}
.offline-btn.is-forced{border-color:var(--online)!important;color:var(--online)!important;}

/* wk check inside card */
.wk-card-check{display:flex;align-items:center;gap:.3rem;cursor:pointer;user-select:none;
  padding:.25rem .5rem;border-radius:6px;border:1px solid rgba(240,171,252,.25);
  background:rgba(240,171,252,.05);transition:all .15s;}
.wk-card-check:hover{border-color:var(--wk-color);}
.wk-card-check.checked{border-color:var(--wk-color);background:rgba(240,171,252,.12);}
.wk-card-check .wk-box{width:13px;height:13px;border-radius:3px;border:1.5px solid rgba(240,171,252,.5);
  background:transparent;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.wk-card-check.checked .wk-box{background:var(--wk-color);border-color:var(--wk-color);}
.wk-card-check.checked .wk-box::after{content:'✓';font-size:.55rem;color:#000;font-weight:800;}
.wk-card-check .wk-label{font-size:.58rem;font-family:'JetBrains Mono',monospace;color:rgba(240,171,252,.7);}
.wk-card-check.checked .wk-label{color:var(--wk-color);}

.busy-row{display:flex;align-items:center;gap:.3rem;}
.busy-toggle{display:flex;align-items:center;gap:2px;cursor:pointer;user-select:none;
  padding:3px 5px;border-radius:6px;border:1px solid var(--border);background:transparent;}
.busy-toggle:hover{border-color:var(--muted);}
.busy-dot{width:8px;height:8px;border-radius:50%;background:#2a3a55;transition:background .15s;}
.busy-toggle[data-level="1"] .busy-dot:nth-child(-n+1){background:var(--busy1);}
.busy-toggle[data-level="2"] .busy-dot:nth-child(-n+2){background:var(--busy2);}
.busy-toggle[data-level="3"] .busy-dot:nth-child(-n+3){background:var(--busy3);}
.busy-toggle[data-level="4"] .busy-dot:nth-child(-n+4){background:var(--busy4);}
.busy-toggle[data-level="5"] .busy-dot:nth-child(-n+5){background:var(--busy5);}
.busy-label{font-size:.58rem;font-family:'JetBrains Mono',monospace;color:var(--muted);white-space:nowrap;}
.busy-label.l1{color:var(--busy1);}.busy-label.l2{color:var(--busy2);}.busy-label.l3{color:var(--busy3);}
.busy-label.l4{color:var(--busy4);}.busy-label.l5{color:var(--busy5);}
.areas-tags{margin-top:.8rem;display:flex;flex-wrap:wrap;gap:.28rem;}
.area-tag{font-size:.61rem;font-family:'JetBrains Mono',monospace;background:var(--tag-bg);border:1px solid var(--border);border-radius:5px;padding:.16rem .44rem;color:var(--muted);}
.obs-tag{font-size:.61rem;font-family:'JetBrains Mono',monospace;background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.3);border-radius:5px;padding:.16rem .44rem;color:var(--accent2);margin-top:.45rem;display:inline-block;}
.tlp-code{font-size:.6rem;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-top:.3rem;opacity:.7;}
.empty-state{text-align:center;padding:3.5rem 2rem;color:var(--muted);}
.empty-state .big{font-size:3rem;margin-bottom:.5rem;}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--success);color:#000;
  font-family:'Syne',sans-serif;font-weight:700;font-size:.84rem;padding:.72rem 1.4rem;
  border-radius:10px;transform:translateY(100px);opacity:0;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:999;}
.toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo-mark">📡</div>
    <div><h1>Equipe Móvel — RJ</h1><p>Rio de Janeiro · Telecom Mobile Team</p></div>
  </div>
  <div class="shift-badge day" id="shiftBadge">
    <span id="shiftIcon">☀️</span>
    <div><div id="shiftLabel">Turno Diurno</div><div class="shift-clock" id="shiftClock"></div></div>
  </div>
</header>

<div class="container">

  <div id="shiftWarn" style="display:none" class="shift-warn">
    <span id="shiftWarnIcon">🌙</span><span id="shiftWarnText"></span>
  </div>

  <!-- PAINEL OCUPAÇÃO -->
  <div class="busy-panel" id="busyPanel" style="display:none">
    <div class="busy-panel-title">⚠ Status alterado</div>
    <div class="busy-list" id="busyList"></div>
  </div>

  <!-- PAINEL SÁBADO E DOMINGO -->
  <div class="weekend-panel" id="weekendPanel">
    <div class="weekend-panel-header" id="weekendPanelHdr">
      <div class="weekend-panel-title">
        <span>📅</span> Plantão Sábado &amp; Domingo
        <span style="font-size:.68rem;color:var(--muted);font-weight:400;font-family:'JetBrains Mono',monospace;" id="wkCount"></span>
      </div>
      <em class="weekend-panel-chevron">▾</em>
    </div>
    <div class="weekend-body" id="weekendBody">
      <div id="weekendSlots"></div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-bar">
      <span class="icon">🔍</span>

  {nome:"Juliano Barbosa",   nc:"JULIANO DE SOUZA BARBOSA",          reg:"ES",     turno:"dia",   tlp:"TLP-T3603622",   cargo:"TÉCNICO MÓVEL",       obs:null,  areas:["Espírito Santo"]},
];

const busyLabels=["","Pouco ocupado","Ocupado","Bem ocupado","Muito ocupado","Indisponível"];
const busyColors=["","var(--busy1)","var(--busy2)","var(--busy3)","var(--busy4)","var(--busy5)"];

/* ── AREAS ── */
const allAreas=["Todas"];
T.forEach(t=>t.areas.forEach(a=>{if(!allAreas.includes(a))allAreas.push(a);}));
const areasBtnsEl=document.getElementById("areasBtns");
allAreas.forEach(area=>{
  const b=document.createElement("button");
  b.className="area-btn"+(area==="Todas"?" selected":"");
  b.textContent=area;b.dataset.area=area;
  areasBtnsEl.appendChild(b);
});

/* ── EVENTOS ── */
document.getElementById("areaToggleBtn").addEventListener("click",()=>{
  const p=document.getElementById("areasPanel"),b=document.getElementById("areaToggleBtn");
  const o=p.classList.toggle("open");b.classList.toggle("open",o);
});
areasBtnsEl.addEventListener("click",e=>{
  const b=e.target.closest(".area-btn");if(!b)return;
  const area=b.dataset.area;
  if(area==="Todas"){
    activeAreas=new Set(["Todas"]);
    document.querySelectorAll(".area-btn").forEach(x=>x.classList.remove("selected"));
    b.classList.add("selected");
  } else {
    activeAreas.delete("Todas");
    if(b.classList.contains("selected")){
      b.classList.remove("selected");
      activeAreas.delete(area);
      if(activeAreas.size===0){
        activeAreas.add("Todas");
        document.querySelector('.area-btn[data-area="Todas"]').classList.add("selected");
      }
    } else {
      b.classList.add("selected");
      activeAreas.add(area);
      document.querySelector('.area-btn[data-area="Todas"]').classList.remove("selected");
    }
  }
  updateAreaBadge();
  renderAll();
});
document.getElementById("clearAreasBtn").addEventListener("click",()=>{
  activeAreas=new Set(["Todas"]);
  document.querySelectorAll(".area-btn").forEach(x=>x.classList.remove("selected"));
  document.querySelector('.area-btn[data-area="Todas"]').classList.add("selected");
  updateAreaBadge();
  renderAll();
});
document.getElementById("searchInput").addEventListener("input",renderAll);
document.getElementById("nightToggleBtn").addEventListener("click",()=>{
  showNightOverride=!showNightOverride;
  updateNightToggleBtn();
  renderAll();
});
document.getElementById("copyAllBtn").addEventListener("click",()=>{
  const vis=T.filter(shouldShow);
  copyClip(vis.map(cardText).join("\n\n---\n\n"),()=>showToast(vis.length+" técnico(s) copiados!"));
});
document.getElementById("weekendPanelHdr").addEventListener("click",()=>{
  document.getElementById("weekendPanel").classList.toggle("collapsed");
  renderWeekendPanel();
});

/* EVENT DELEGATION no mainContent */
document.getElementById("mainContent").addEventListener("click",e=>{
  const cb=e.target.closest(".copy-btn");
  if(cb){const t=T.find(x=>x.nome===cb.dataset.key);if(!t)return;
    copyClip(cardText(t),()=>{cb.textContent="✓ Copiado";cb.classList.add("copied");
    setTimeout(()=>{cb.textContent="⧉ Copiar";cb.classList.remove("copied");},2000);showToast("Dados copiados!");});return;}
  const ob=e.target.closest(".offline-btn");
  if(ob){const k=ob.dataset.key;offlineState[k]=!offlineState[k];renderAll();renderBusyPanel();return;}
  const bb=e.target.closest(".busy-toggle");
  if(bb){busyState[bb.dataset.key]=((busyState[bb.dataset.key]||0)+1)%6;renderAll();renderBusyPanel();return;}
  const wk=e.target.closest(".wk-card-check");
  if(wk){const k=wk.dataset.key;wkState[k]=!wkState[k];renderAll();renderWeekendPanel();return;}
  const rh=e.target.closest(".region-header");
  if(rh){const id=rh.dataset.regid;collapseState[id]=!collapseState[id];
    const body=document.getElementById("rb-"+id);const arrow=rh.querySelector(".region-collapse-btn");
    if(body){body.classList.toggle("collapsed",!!collapseState[id]);
      if(!collapseState[id])requestAnimationFrame(()=>{body.style.maxHeight=body.scrollHeight+20+"px";});
      else body.style.maxHeight="0";}
    if(arrow){arrow.textContent=collapseState[id]?"▶":"▼";}return;}
});

/* ── HELPERS ── */
function updateAreaBadge(){
  const badge=document.getElementById("activeAreaBadge");
  const clearBtn=document.getElementById("clearAreasBtn");
  if(activeAreas.has("Todas")||activeAreas.size===0){
    badge.textContent="Todas";clearBtn.style.display="none";
  } else {
    badge.textContent=activeAreas.size===1?[...activeAreas][0]:activeAreas.size+" áreas";
    clearBtn.style.display="flex";
  }
}
function isEveningMode(){const h=new Date().getHours();return h>=17||h<7;}
function nightVisible(){
  if(isEveningMode()) return !showNightOverride;
  return isNightActive()||showNightOverride;
}
function dayVisible(){
  if(isEveningMode()) return showNightOverride;
  return true;
}
function status(t){return offlineState[t.nome]?"offline":"online";}
function shouldShow(t){
  if(t.turno==="noite"&&!nightVisible())return false;
  if(t.turno==="dia"&&!dayVisible())return false;
  // fds sempre visível (mas marcados)
  if(!activeAreas.has("Todas")&&!t.areas.some(a=>activeAreas.has(a)))return false;
  const q=document.getElementById("searchInput").value.toLowerCase();
  if(q&&!t.nome.toLowerCase().includes(q)&&!t.nc.toLowerCase().includes(q)&&!t.areas.some(a=>a.toLowerCase().includes(q))&&!(t.tlp&&t.tlp.toLowerCase().includes(q)))return false;
  return true;
}
function cardText(t){
  const l=["NOME: "+t.nc];
  if(t.tlp)l.push("TLP: "+t.tlp);
  if(t.obs)l.push("OBS: "+t.obs);
  l.push("ÁREAS: "+t.areas.join(", "));
  return l.join("\n");
}
function copyClip(text,cb){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(cb).catch(()=>fbCopy(text,cb));}
  else fbCopy(text,cb);
}
function fbCopy(text,cb){
  const ta=document.createElement("textarea");ta.value=text;ta.style.cssText="position:fixed;top:0;left:0;opacity:0";
  document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand("copy");cb();}catch(e){}document.body.removeChild(ta);
}
function showToast(m){const el=document.getElementById("toast");el.textContent=m;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2500);}

function updateNightToggleBtn(){
  const h=new Date().getHours();
  const b=document.getElementById("nightToggleBtn");
  b.classList.toggle("active",showNightOverride);
  if(isEveningMode()){
    b.textContent=showNightOverride?"☀️ Ocultar diurnos":"☀️ Mostrar diurnos";
  } else {
    b.textContent=showNightOverride?"🌙 Ocultar noturnos":"🌙 Mostrar noturnos";
  }
}

/* ── WEEKEND PANEL ── */
function renderWeekendPanel(){
  const slots=document.getElementById("weekendSlots");
  const panel=document.getElementById("weekendPanel");
  const wkTechs=T.filter(t=>wkState[t.nome]);
  document.getElementById("wkCount").textContent=wkTechs.length?"("+wkTechs.length+" confirmado"+(wkTechs.length>1?"s":"")+")" :"";
  if(!wkTechs.length){
    slots.innerHTML='<div class="weekend-empty">Nenhum técnico marcado para o plantão. Marque o ✓ no card do técnico.</div>';
    return;
  }
  slots.innerHTML=wkTechs.map(t=>'<div class="wk-slot">'
    +'<div><div class="wk-slot-name">'+t.nome+'</div>'
    +'<div class="wk-slot-area">'+t.areas.slice(0,3).join(" · ")+(t.areas.length>3?" …":"")+'</div></div>'
    +'</div>').join('');
  const body=document.getElementById("weekendBody");
  if(!panel.classList.contains("collapsed")){body.style.maxHeight=body.scrollHeight+50+"px";}
}

/* ── BUSY PANEL ── */
function renderBusyPanel(){
  const panel=document.getElementById("busyPanel"),list=document.getElementById("busyList");
  const ones=T.filter(t=>(busyState[t.nome]||0)>0||offlineState[t.nome]);
  if(!ones.length){panel.style.display="none";return;}
  panel.style.display="";
  list.innerHTML=ones.map(t=>{
    const off=offlineState[t.nome],lvl=busyState[t.nome]||0;
    const col=off?"var(--offline)":busyColors[lvl];
    const lbl=off?"🔴 Offline":(lvl>0?busyLabels[lvl]:"");
    return'<div class="busy-chip" style="background:'+col+'22;border-color:'+col+';color:'+col+'">'+t.nome+(lbl?' <span style="font-size:.62rem;opacity:.85">'+lbl+'</span>':'')+'</div>';
  }).join('');
}

/* ── SHIFT UI ── */
function updateShiftUI(){
  const now=new Date(),h=now.getHours(),m=String(now.getMinutes()).padStart(2,"0");
  const night=isNightActive();
  document.body.classList.toggle("theme-night",night);
  const badge=document.getElementById("shiftBadge");
  badge.className="shift-badge "+(night?"night":"day");
  document.getElementById("shiftIcon").textContent=night?"🌙":"☀️";
  document.getElementById("shiftLabel").textContent=night?"Turno Noturno":"Turno Diurno";
  document.getElementById("shiftClock").textContent=h+":"+m+(night?" · até 07:00":" · noturno às 15:00");
  updateNightToggleBtn();
  const warn=document.getElementById("shiftWarn");
  if(!night&&!showNightOverride){
    warn.style.display="flex";
    document.getElementById("shiftWarnIcon").textContent="🌙";
    document.getElementById("shiftWarnText").textContent=
      "Técnicos noturnos entram às 15:00 — faltam "+(NIGHT_START-h)+"h. Use 🌙 para visualizá-los.";
  } else if(night&&!showNightOverride&&isEveningMode()){
    warn.style.display="flex";
    document.getElementById("shiftWarnIcon").textContent="☀️";
    document.getElementById("shiftWarnText").textContent="Turno diurno encerrado. Use ☀️ para visualizá-los.";
  } else warn.style.display="none";
}

/* ── MAKE CARD ── */
function makeCard(t){
  const lvl=busyState[t.nome]||0,st=status(t),isOff=st==="offline";
  const card=document.createElement("div");
  let cls="tech-card";
  if(t.turno==="noite")cls+=" night-card";
  if(t.turno==="fds")cls+=" fds-only";
  if(isOff)cls+=" is-offline";
  else if(lvl>0)cls+=" busy-"+lvl;
  card.className=cls;card.dataset.region=t.reg;
  const dots='<div class="busy-dot"></div>'.repeat(5);
  const blc=lvl>0?"l"+lvl:"",blt=lvl>0?busyLabels[lvl]:"Livre";
  const showFull=t.nc.trim().toUpperCase()!==t.nome.trim().toUpperCase();
  const isWk=wkState[t.nome]||false;
  const isForced=offlineState[t.nome]||false;
  const isCoord=t.cargo.includes("COORD");

  card.innerHTML=
    '<div class="card-top"><div class="card-info">'
    +'<div class="card-name-row">'
    +'<div class="status-dot '+st+'"></div>'
    +'<div class="tech-name">'+t.nome+'</div>'
    +'<span class="status-text '+st+'">'+(isOff?"Offline":"Online")+'</span>'
    +'</div>'
    +(showFull?'<div class="tech-full-name">'+t.nc+'</div>':'')
    +'<div class="tech-role">'+t.cargo+'</div>'
    +'<div class="card-tags">'
    +(isCoord?'<span class="coord-tag">⭐ Coordenador</span>':'')
    +(t.turno==="noite"?'<span class="night-tag">🌙 Noturno</span>':'')
    +(t.turno==="fds"?'<span class="fds-tag">📅 Fim de semana</span>':'')
    +(t.tlp?'<span class="tlp-tag">'+t.tlp+'</span>':'')
    +'</div>'
    +(t.obs?'<span class="obs-tag">⚠ '+t.obs+'</span>':'')
    +'</div>'
    +'<div class="card-actions">'
    +'<button class="copy-btn" data-key="'+t.nome+'">⧉ Copiar</button>'
    +'<button class="offline-btn'+(isForced?" is-forced":"")+'" data-key="'+t.nome+'">'+(isForced?"🟢 Online":"🔴 Offline")+'</button>'
    +'<div class="wk-card-check'+(isWk?" checked":"")+'" data-key="'+t.nome+'">'
    +'<div class="wk-box"></div><span class="wk-label">Sáb/Dom</span>'
    +'</div>'
    +'<div class="busy-row"><button class="busy-toggle" data-level="'+lvl+'" data-key="'+t.nome+'">'+dots+'</button>'
    +'<span class="busy-label '+blc+'">'+blt+'</span></div>'
    +'</div></div>'
    +'<div class="areas-tags">'+t.areas.map(a=>'<span class="area-tag">'+a+'</span>').join('')+'</div>';
  return card;
}

function makeDiv(cls,icon,lbl){
  const d=document.createElement("div");d.className="turno-divider";
  d.innerHTML='<div class="turno-divider-line"></div><span class="turno-divider-label '+cls+'">'+icon+' '+lbl+'</span><div class="turno-divider-line"></div>';
  return d;
}

/* ── RENDER ALL ── */
function renderAll(){
  updateShiftUI();
  const content=document.getElementById("mainContent");content.innerHTML="";let total=0;
  REGIOES.forEach(reg=>{
    const dia  =T.filter(t=>t.reg===reg.id&&t.turno==="dia" &&shouldShow(t));
    const noite=T.filter(t=>t.reg===reg.id&&t.turno==="noite"&&shouldShow(t));
    const fds  =T.filter(t=>t.reg===reg.id&&t.turno==="fds" &&shouldShow(t));
    if(!dia.length&&!noite.length&&!fds.length)return;
    total+=dia.length+noite.length+fds.length;
    const collapsed=!!collapseState[reg.id];

    const sec=document.createElement("div");sec.className="region-section";
    const rh=document.createElement("div");
    rh.className="region-header";rh.dataset.regid=reg.id;
    rh.innerHTML='<div class="region-dot" style="background:'+reg.color+'"></div>'
      +'<span class="region-title" style="color:'+reg.color+'">'+reg.label+'</span>'
      +'<span class="region-count" style="margin-left:.5rem">'+(dia.length+noite.length+fds.length)+' técnico(s)</span>'
      +'<button class="region-collapse-btn">'+(collapsed?"▶":"▼")+'</button>';
    sec.appendChild(rh);

    const body=document.createElement("div");
    body.className="region-body"+(collapsed?" collapsed":"");
    body.id="rb-"+reg.id;

    const grid=document.createElement("div");grid.className="cards-grid";
    if(dia.length){if(noite.length||fds.length)grid.appendChild(makeDiv("day","☀️","Diurno"));dia.forEach(t=>grid.appendChild(makeCard(t)));}
    if(noite.length){grid.appendChild(makeDiv("night","🌙","Noturno · 15h+"));noite.forEach(t=>grid.appendChild(makeCard(t)));}
    if(fds.length){grid.appendChild(makeDiv("fds","📅","Fim de Semana"));fds.forEach(t=>grid.appendChild(makeCard(t)));}
    body.appendChild(grid);

    if(!collapsed){requestAnimationFrame(()=>{body.style.maxHeight=body.scrollHeight+20+"px";});}
    else{body.style.maxHeight="0";}

    sec.appendChild(body);content.appendChild(sec);
  });
  document.getElementById("countDisplay").textContent=total;
  if(!total)content.innerHTML='<div class="empty-state"><div class="big">📡</div><p>Nenhum técnico encontrado.</p></div>';
}

/* ── INIT ── */
updateShiftUI();renderAll();renderBusyPanel();renderWeekendPanel();
setInterval(()=>{renderAll();renderBusyPanel();},60000);
</script>
</body>
